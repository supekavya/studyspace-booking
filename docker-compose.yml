version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: studyspace-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: studyspace123
      MYSQL_DATABASE: studyspace_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pstudyspace123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyspace-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/studyspace_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: studyspace123
      APP_JWT_SECRET: studyspace_super_secret_jwt_key_change_in_production_256bits
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend:80
    ports:
      - "8080:8080"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studyspace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
